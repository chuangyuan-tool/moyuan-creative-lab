<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨渊·创世工坊 · 全栈版</title>
  <style>
    :root {
      --bg: #0a0e17; --sidebar: #101524; --card: #1a1f32; --border: #2a3145;
      --text: #eaeef2; --text2: #8892a5; --accent: #f0c45a; --hover: #232a3e;
      --btn-bg: #1a1f32; --btn-border: #3a4058; --radius: 14px;
    }
    body.light {
      --bg: #f4f6f9; --sidebar: #ffffff; --card: #ffffff; --border: #dce1e8;
      --text: #1e293b; --text2: #475569; --accent: #b8860b; --hover: #f1f3f8;
      --btn-bg: #e2e8f0; --btn-border: #cbd5e1;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); transition:0.3s; }
    .app { display:flex; height:100vh; overflow:hidden; }
    .sidebar {
      width:260px; background:var(--sidebar); display:flex; flex-direction:column;
      border-right:1px solid var(--border); z-index:10; position:relative;
    }
    .logo { padding:22px 20px 10px; font-size:19px; font-weight:bold; color:var(--accent); cursor:pointer; }
    nav { flex:1; overflow-y:auto; padding:6px 0; }
    nav a { display:flex; align-items:center; gap:9px; padding:10px 20px; color:var(--text2); text-decoration:none; font-size:14px; transition:0.2s; }
    nav a:hover, nav a.active { background:var(--hover); color:var(--accent); border-left:3px solid var(--accent); }
    .bottom-group { border-top:1px solid var(--border); padding:10px 0; }
    .bottom-group a { display:block; padding:8px 20px; color:var(--text2); text-decoration:none; font-size:13px; }
    .bottom-group a:hover { color:var(--accent); }
    .gear-btn { position:absolute; bottom:10px; right:15px; background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; }
    .main { flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { background:var(--sidebar); padding:8px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .right-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    button, select { padding:6px 14px; background:var(--btn-bg); border:1px solid var(--btn-border); color:var(--text); border-radius:8px; cursor:pointer; font-size:13px; }
    .btn-primary { background:var(--accent)!important; color:#0a0f1a!important; border:none!important; font-weight:bold; }
    .content { flex:1; overflow-y:auto; padding:20px; }
    .right-panel { width:280px; background:var(--sidebar); padding:16px; border-left:1px solid var(--border); overflow-y:auto; }
    .memory-item { background:var(--card); padding:10px; border-radius:8px; margin-bottom:8px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
    .memory-item button { padding:2px 8px; font-size:12px; }

    .hero { text-align:center; padding:30px 0 10px; }
    .hero h1 { font-size:48px; font-weight:900; background:linear-gradient(135deg, #f0c45a, #ff6b6b, #4ecdc4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .slogan-carousel { height:70px; position:relative; margin:25px 0; }
    .slogan-item { position:absolute; width:100%; left:0; opacity:0; font-size:28px; font-weight:bold; text-shadow:0 0 10px var(--accent); animation:carousel 16s infinite; }
    .slogan-item:nth-child(1) { animation-delay:0s; } .slogan-item:nth-child(2) { animation-delay:4s; } .slogan-item:nth-child(3) { animation-delay:8s; } .slogan-item:nth-child(4) { animation-delay:12s; }
    @keyframes carousel { 0%,18% { opacity:0; transform:translateY(30px); } 20%,38% { opacity:1; transform:translateY(0); } 40%,100% { opacity:0; transform:translateY(-30px); } }
    .scene-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(230px,1fr)); gap:20px; margin:30px 0; }
    .scene-card { background:var(--card); border-radius:20px; padding:25px; text-align:center; transition:0.3s; }
    .cta-wrapper { text-align:center; }
    .cta-btn { padding:18px 55px; font-size:22px; font-weight:bold; background:var(--accent); color:#0a0f1a; border:none; border-radius:50px; box-shadow:0 0 35px rgba(240,196,90,0.7); cursor:pointer; display:inline-block; margin:30px auto; }
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
    .modal-box { background:var(--sidebar); padding:24px; border-radius:var(--radius); width:90%; max-width:500px; color:var(--text); position:relative; }
    .modal-close { position:absolute; top:10px; right:15px; background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2a3a5c; color:#fff; padding:10px 20px; border-radius:8px; z-index:200; }
    .word-count { font-size:12px; color:var(--text2); margin-top:4px; }
    .progress-bar { height:8px; background:var(--border); border-radius:4px; margin:6px 0; }
    .progress-fill { height:100%; background:var(--accent); border-radius:4px; width:0%; }
    .platform-card.selected { border-color: var(--accent); box-shadow: 0 0 15px rgba(240,196,90,0.6); }
    .platform-card { border:2px solid transparent; border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:0.2s; background:var(--bg); }
    .tool-links { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .tool-links a { background:var(--btn-bg); color:var(--accent); padding:4px 12px; border-radius:20px; text-decoration:none; font-size:12px; border:1px solid var(--btn-border); transition:0.2s; }
    .tool-links a:hover { background:var(--accent); color:#0a0f1a; }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo" id="logoTitle">墨渊·创世工坊 <small>v7.0</small></div>
    <nav id="mainNav">
      <a href="#home" class="active">🏠 首页</a>
      <a href="#create">✍️ 创作工坊</a>
      <a href="#remake">🔄 二次创作</a>
      <a href="#video">🎬 漫剧·微电影</a>
      <a href="#music">🎵 墨韵乐章</a>
      <a href="#aiassistant">🤖 创作AI助手</a>
      <a href="#monetize">💰 创作者变现通道</a>
      <a href="#learn">📚 技能进化</a>
      <a href="#promote">📡 全网推广</a>
      <a href="#deai">🧹 作品去AI</a>
    </nav>
    <div class="bottom-group">
      <a href="#" id="downloadAppBtn">📲 下载App <small>(开发中)</small></a>
      <a href="#" id="updateLogBtn">📋 更新日志</a>
      <a href="#" id="chatbotLink">💬 客服</a>
      <a href="#" id="feedbackLink">📝 问题反馈</a>
      <a href="#" id="logoutBtn" style="display:none;">🚪 退出</a>
      <a href="#" id="adminEntry" style="display:none;">⚙️ 管理员</a>
    </div>
    <button class="gear-btn" id="settingsBtn">⚙️</button>
  </aside>
  <div class="main">
    <div class="topbar">
      <select id="modelSelect"><option>ChatGLM</option><option>Qwen</option><option>Kimi</option></select>
      <button id="tutorialBtn" class="btn-primary">📘 教程</button>
      <div class="right-actions">
        <button id="translateBtn">🌐 翻译</button>
        <button id="themeToggle">🌓</button>
        <div id="authArea"><button id="loginBtn">登录</button><button id="registerBtn">注册</button></div>
        <span id="userBadge" style="display:none;"></span>
      </div>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <h3>🧠 记忆胶囊</h3>
    <div id="savedWorks"><p style="color:var(--text2);">暂无作品</p></div>
  </div>
</div>

<!-- 弹窗结构 -->
<div class="modal-overlay" id="tutorialModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('tutorialModal')">✕</span><h3>📘 快速上手</h3><p>登录后即可使用全部功能。</p><button class="btn-primary" onclick="hideModal('tutorialModal')">知道了</button></div>
</div>
<div class="modal-overlay" id="loginModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('loginModal')">✕</span>
    <h3>🔑 登录</h3>
    <input id="loginEmail" placeholder="邮箱/手机"><input id="loginPassword" type="password" placeholder="密码">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
      <a href="#" id="forgotPasswordLink" style="color:var(--accent);">忘记密码？</a>
      <button class="btn-primary" id="loginSubmit">登录</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="registerModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('registerModal')">✕</span>
    <h3 id="registerModalTitle">📝 注册新账号</h3>
    <input id="regEmail" placeholder="邮箱/手机"><input id="regPassword" type="password" placeholder="设置密码">
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:10px;">
      <button class="btn-primary" id="registerSubmit">注册</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="chatbotModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('chatbotModal')">✕</span><h3>💬 客服</h3><div id="chatMessages" style="height:150px;overflow-y:auto;background:var(--bg);padding:8px;margin-bottom:8px;"></div><input id="chatInput" placeholder="输入问题"><button class="btn-primary" id="chatSend">发送</button></div>
</div>
<div class="modal-overlay" id="adminModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('adminModal')">✕</span><h3>🔐 管理员面板</h3><input id="adminUserSearch" placeholder="用户ID"><div style="margin:10px 0; display:flex; gap:8px;"><button id="adminBanPartial">部分封禁</button><button id="adminBanFull">全封禁</button><button id="adminUnban">解封</button></div><textarea id="adminReplyMsg" placeholder="回复反馈..."></textarea><button class="btn-primary" id="adminReplySend">发送回复</button></div>
</div>
<div class="modal-overlay" id="settingsModal" style="display:none;">
  <div class="modal-box"><span class="modal-close" onclick="hideModal('settingsModal')">✕</span>
    <h3>⚙️ 设置</h3>
    <label>昵称</label><input id="setNick" placeholder="墨渊用户">
    <label>默认模型</label><select id="setModel"><option>ChatGLM</option><option>Qwen</option><option>Kimi</option></select>
    <label>界面语言</label><select id="setLang"><option>简体中文</option><option>English</option></select>
    <div style="display:flex; gap:20px; margin:10px 0;">
      <label><input type="checkbox" id="setNotify" checked> 开启通知</label>
      <label><input type="checkbox" id="setPrivacy"> 隐私模式</label>
    </div>
    <button class="btn-primary" id="saveSettings">保存设置</button>
  </div>
</div>
<div class="toast" id="toast" style="display:none;"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 2000); }
  function showModal(id) { document.getElementById(id).style.display = 'flex'; }
  function hideModal(id) { document.getElementById(id).style.display = 'none'; }
  window.hideModal = hideModal;

  let curUser = null, logoClicks = 0, guestTimer, guestPrompted = false;
  const adminEntry = document.getElementById('adminEntry'), userBadge = document.getElementById('userBadge'),
        authArea = document.getElementById('authArea'), logoutBtn = document.getElementById('logoutBtn'),
        mainContent = document.getElementById('mainContent'), navLinks = document.querySelectorAll('#mainNav a');

  function startGuestTimer() {
    if (guestTimer) clearTimeout(guestTimer);
    guestTimer = setTimeout(() => {
      if (!curUser && !guestPrompted) {
        document.getElementById('registerModalTitle').textContent = '📝 立即注册，踏上圆梦之旅';
        showModal('registerModal');
        guestPrompted = true;
      }
    }, 2 * 60 * 1000);
  }
  function stopGuestTimer() { if (guestTimer) { clearTimeout(guestTimer); guestTimer = null; } }

  function loginAs(user) {
    curUser = user; stopGuestTimer();
    userBadge.textContent = user.name; userBadge.style.display = 'inline';
    authArea.style.display = 'none'; logoutBtn.style.display = 'block';
    adminEntry.style.display = user.isAdmin ? 'block' : 'none';
  }
  function logout() {
    curUser = null; adminEntry.style.display = 'none'; userBadge.style.display = 'none';
    authArea.style.display = 'flex'; logoutBtn.style.display = 'none'; showToast('已退出'); startGuestTimer();
  }
  function requireLogin() {
    document.getElementById('registerModalTitle').textContent = '📝 立即注册，踏上圆梦之旅';
    showModal('registerModal');
  }

  // 管理员激活
  document.getElementById('logoTitle').addEventListener('click', () => {
    logoClicks++;
    if (logoClicks >= 5) { logoClicks = 0; const pwd = prompt('管理员密码'); if (pwd === 'zfj458888') { loginAs({id:'admin123', name:'墨渊作者', isAdmin:true}); showToast('管理员已登录'); } else showToast('密码错误'); }
  });
  document.getElementById('loginBtn').addEventListener('click', () => showModal('loginModal'));
  document.getElementById('registerBtn').addEventListener('click', () => { document.getElementById('registerModalTitle').textContent = '📝 注册新账号'; showModal('registerModal'); });
  document.getElementById('loginSubmit').addEventListener('click', () => { const email = document.getElementById('loginEmail').value.trim(); if (!email) return showToast('请输入邮箱/手机'); loginAs({id:'u1', name: email.split('@')[0] || email, isAdmin: false}); hideModal('loginModal'); showToast('登录成功'); });
  document.getElementById('registerSubmit').addEventListener('click', () => { const email = document.getElementById('regEmail').value.trim(); if (!email) return showToast('请输入邮箱/手机'); const newId = 'MU' + Math.random().toString(36).substr(2, 6).toUpperCase(); loginAs({id: newId, name: email.split('@')[0] || email, isAdmin: false}); hideModal('registerModal'); showToast('注册成功，已自动登录'); });
  document.getElementById('forgotPasswordLink').addEventListener('click', e => { e.preventDefault(); hideModal('loginModal'); showToast('请联系客服或提交问题反馈'); });
  logoutBtn.addEventListener('click', logout);
  adminEntry.addEventListener('click', e => { e.preventDefault(); showModal('adminModal'); });

  document.getElementById('adminBanPartial').addEventListener('click', () => showToast('部分封禁成功'));
  document.getElementById('adminBanFull').addEventListener('click', () => showToast('全封禁成功'));
  document.getElementById('adminUnban').addEventListener('click', () => showToast('已解封'));
  document.getElementById('adminReplySend').addEventListener('click', () => { showToast('回复已发送'); hideModal('adminModal'); });
  document.getElementById('settingsBtn').addEventListener('click', () => showModal('settingsModal'));
  document.getElementById('saveSettings').addEventListener('click', () => { showToast('设置已保存'); hideModal('settingsModal'); });
  document.getElementById('tutorialBtn').addEventListener('click', () => showModal('tutorialModal'));
  const savedTheme = localStorage.getItem('theme'); if (savedTheme === 'light') document.body.classList.add('light');
  document.getElementById('themeToggle').addEventListener('click', () => { document.body.classList.toggle('light'); localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark'); });
  document.getElementById('translateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const t = prompt('翻译文本：'); if(t) alert(t + ' → translated'); });
  document.getElementById('updateLogBtn').addEventListener('click', e => { e.preventDefault(); alert('v7.0 增加各板块AI工具链接，变现渠道丰富'); });
  document.getElementById('feedbackLink').addEventListener('click', e => { e.preventDefault(); const m = prompt('问题'); if(m) showToast('反馈已提交'); });
  document.getElementById('downloadAppBtn').addEventListener('click', e => { e.preventDefault(); alert('App 开发中'); });
  document.getElementById('chatbotLink').addEventListener('click', e => { e.preventDefault(); showModal('chatbotModal'); });
  document.getElementById('chatSend').addEventListener('click', () => { const msg = document.getElementById('chatInput').value.trim(); if (!msg) return; document.getElementById('chatMessages').innerHTML += `<p><b>你:</b> ${escapeHtml(msg)}</p><p><b>客服:</b> 已收到。</p>`; document.getElementById('chatInput').value = ''; });

  if (!localStorage.getItem('savedWorks')) localStorage.setItem('savedWorks', JSON.stringify([]));
  function saveWork(type, content) { if (!curUser) return requireLogin(); const works = JSON.parse(localStorage.getItem('savedWorks')); works.push({ id: Date.now(), type, content, time: new Date().toLocaleString() }); localStorage.setItem('savedWorks', JSON.stringify(works)); refreshSavedPanel(); showToast('已保存'); }
  function refreshSavedPanel() { const works = JSON.parse(localStorage.getItem('savedWorks')); const div = document.getElementById('savedWorks'); if (!div) return; if (works.length === 0) { div.innerHTML = '<p style="color:var(--text2);">暂无作品</p>'; return; } div.innerHTML = works.map(w => `<div class="memory-item"><span><b>${escapeHtml(w.type)}</b> ${escapeHtml(w.time)}</span><button onclick="navigator.clipboard.writeText('${escapeHtml(w.content).replace(/'/g,"\\'")}');showToast('已复制')">复制</button></div>`).join(''); }
  function updateSkill(name, amount) { if (!curUser) return; let skills = JSON.parse(localStorage.getItem('skills') || '[{"name":"人物塑造","progress":68,"unlocked":true},{"name":"导演思维","progress":30,"unlocked":true},{"name":"世界观架构","progress":0,"unlocked":false}]'); let log = JSON.parse(localStorage.getItem('evolutionLog') || '[]'); const sk = skills.find(s => s.name === name); if (sk && sk.unlocked) { sk.progress = Math.min(100, sk.progress + amount); log.unshift(`${new Date().toLocaleTimeString()} ${name} +${amount}%`); } localStorage.setItem('skills', JSON.stringify(skills)); localStorage.setItem('evolutionLog', JSON.stringify(log.slice(0,20))); }

  function switchPage(page) { location.hash = page; navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + page)); renderPage(page); }
  window.switchPage = switchPage;

  function renderPage(page) {
    let html = '';
    if (page === 'home') {
      html = `<div class="hero"><h1>一字生万象，一键通寰宇</h1><div class="slogan-carousel"><div class="slogan-item" style="color:#f0c45a;">墨渊·上班族的小金库</div><div class="slogan-item" style="color:#ff6b6b;">墨渊·平凡人圆梦的地方</div><div class="slogan-item" style="color:#4ecdc4;">墨渊·让每一份才华都兑现</div><div class="slogan-item" style="color:#f0c45a;">墨渊·现在注册，开始创作</div></div></div><div class="scene-grid"><div class="scene-card"><div style="font-size:40px;">📖</div><h3>笔下苍穹</h3><p>1.2万追读</p></div><div class="scene-card"><div style="font-size:40px;">🎤</div><h3>原创金曲</h3><p>100万+播放</p></div><div class="scene-card"><div style="font-size:40px;">🎬</div><h3>漫剧大片</h3><p>500万观看</p></div><div class="scene-card"><div style="font-size:40px;">💰</div><h3>喜悦变现</h3><p>¥5,280</p></div></div><div class="cta-wrapper"><button class="cta-btn" id="startCreateBtn">🚀 立即免费开始创作</button></div>`;
    }
    // 创作工坊
    else if (page === 'create') {
      html = `<div style="display:flex;gap:20px;height:70vh;"><div style="flex:7;background:var(--card);border-radius:14px;padding:20px;display:flex;flex-direction:column;"><h3>✍️ 创作工坊</h3><div id="chatLog" style="flex:1;overflow-y:auto;margin-bottom:10px;"><div class="chat-bubble bubble-system">输入构思，点击发送。</div></div><div style="display:flex;gap:10px;"><button id="genOutlineBtn" class="btn-primary">📋 生成大纲</button><button id="genFullBtn">⚡ 一键生成全文</button><button id="saveChapterBtn">💾 保存章节</button></div></div><div style="flex:3;background:var(--card);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px;"><div class="preset-row"><select id="genreSel"><option>玄幻修仙</option><option>都市悬疑</option></select><select id="lengthSel"><option>短篇</option><option>长篇</option></select><select id="styleSel"><option>热血</option><option>暗黑</option></select></div><textarea id="userMsgInput" placeholder="输入你的构思..." style="height:150px;"></textarea><div class="word-count" id="createWordCount">字数：0</div><button class="btn-primary" id="sendMsgBtn">发送构思</button><div class="tool-links"><span style="color:var(--text2);font-size:12px;">📚 写作工具：</span><a href="https://chat.openai.com" target="_blank">ChatGPT</a><a href="https://claude.ai" target="_blank">Claude</a><a href="https://yiyan.baidu.com" target="_blank">文心一言</a><a href="https://tongyi.aliyun.com" target="_blank">通义千问</a><a href="https://chatglm.cn" target="_blank">智谱清言</a><a href="https://kimi.moonshot.cn" target="_blank">Kimi</a><a href="https://deepseek.com" target="_blank">DeepSeek</a><a href="https://www.doubao.com" target="_blank">豆包</a><a href="https://www.bailing.com" target="_blank">百川</a><a href="https://www.xiaoyishu.com" target="_blank">秘塔写作猫</a></div></div></div>`;
    }
    // 二次创作
    else if (page === 'remake') {

    }
    // 变现通道 (大幅增加平台)
    else if (page === 'monetize') {
      const platforms = [
        '番茄小说','七猫','书旗','起点','晋江','知乎盐选','豆瓣阅读','微信读书',
        'YouTube','TikTok','快手','抖音','B站','西瓜视频','Vimeo',
        'Spotify','SoundCloud','网易云音乐开放平台','QQ音乐开放平台','酷狗音乐开放平台',
        '喜马拉雅','蜻蜓FM','懒人听书','爱发电','Patreon','Buy Me a Coffee'

      html = `<div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h2>💰 创作者变现通道</h2><div style="display:flex;gap:20px;"><div style="flex:2;"><div style="display:flex;gap:8px;margin-bottom:10px;"><button id="selectAll">全选</button><button id="clearAll">清空</button><span>已选 <b id="selectedCount">0</b></span></div><div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(100px,1fr));gap:8px;">${platforms.map(p => `<div class="platform-card" data-platform="${p}">${p}</div>`).join('')}</div></div><div style="flex:1;"><h4>发布操作</h4><div id="selectedPlatformList" style="background:var(--bg);padding:10px;border-radius:8px;min-height:100px;"></div><button id="batchPublish" class="btn-primary" style="width:100%;margin-top:8px;">一键发布</button><button id="monetizeHistoryBtn" style="width:100%;margin-top:8px;">发布历史</button></div></div></div>`;
    }
    // 技能进化
    else if (page === 'learn') {
      const skills = JSON.parse(localStorage.getItem('skills') || '[{"name":"人物塑造","progress":68,"unlocked":true},{"name":"导演思维","progress":30,"unlocked":true},{"name":"世界观架构","progress":0,"unlocked":false}]');
      const log = JSON.parse(localStorage.getItem('evolutionLog') || '[]');
      html = `<div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h2>📚 技能进化</h2>${skills.map(s => `<div><b>${s.name}</b> ${s.unlocked?'✅':'🔒'}<div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%"></div></div></div>`).join('')}<h4>进化日志</h4><div>${log.slice(0,5).map(l => '<div>'+l+'</div>').join('') || '暂无记录'}</div></div>`;
    }
    // 全网推广
    else if (page === 'promote') {
      html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h3>📢 推广内容</h3><textarea id="promoteInput" placeholder="作品简介..."></textarea><div class="word-count" id="promoteInputCount">简介字数：0</div><select id="promotePlatform"><option>微博</option><option>小红书</option><option>抖音</option></select><button id="promoteGenerateBtn" class="btn-primary">生成文案</button><div class="tool-links"><span style="color:var(--text2);font-size:12px;">📊 营销工具：</span><a href="https://www.newrank.cn" target="_blank">新榜</a><a href="https://www.weiboyi.com" target="_blank">微小宝</a><a href="https://www.xiguaji.com" target="_blank">西瓜数据</a><a href="https://www.feigua.cn" target="_blank">飞瓜数据</a><a href="https://www.relangyinqing.com" target="_blank">热浪引擎</a><a href="https://www.douchacha.com" target="_blank">抖查查</a><a href="https://www.wenangou.com" target="_blank">文案狗</a><a href="https://www.giiso.com" target="_blank">Giiso</a><a href="https://www.yiigle.com" target="_blank">易撰</a><a href="https://www.5118.com" target="_blank">5118</a></div></div><div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h3>📄 文案预览</h3><div id="promoteResult" style="background:var(--bg);padding:15px;min-height:200px;"></div><div class="word-count" id="promoteResultCount">文案字数：0</div><button id="promoteCopyBtn">复制文案</button><button id="promoteSaveBtn">保存</button></div></div>`;

    // 作品去AI
    else if (page === 'deai') {
      html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h3>📥 原始文本</h3><textarea id="deaiInput" placeholder="粘贴需要去AI的文本"></textarea><div class="word-count" id="deaiInputCount">字数：0</div><select id="deaiMode"><option>降低AI度</option><option>深度改写</option></select><button id="deaiProcessBtn" class="btn-primary">开始处理</button><div class="tool-links"><span style="color:var(--text2);font-size:12px;">🔍 去AI检测：</span><a href="https://gptzero.me" target="_blank">GPTZero</a><a href="https://copyleaks.com" target="_blank">Copyleaks</a><a href="https://originality.ai" target="_blank">Originality.ai</a><a href="https://sapling.ai" target="_blank">Sapling</a><a href="http://gltr.io" target="_blank">GLTR</a><a href="https://www.zerogpt.com" target="_blank">ZeroGPT</a><a href="https://writer.com" target="_blank">Writer</a><a href="https://contentatscale.ai" target="_blank">Content at Scale</a><a href="https://undetectable.ai" target="_blank">Undetectable</a><a href="https://hivemoderation.com" target="_blank">Hive Moderation</a></div></div><div class="glass-panel" style="background:var(--card);padding:20px;border-radius:14px;"><h3>📤 处理后文本</h3><div id="deaiResult" style="background:var(--bg);padding:15px;min-height:200px;"></div><div class="word-count" id="deaiResultCount">字数：0</div><button id="deaiCopyBtn">复制</button><button id="deaiSaveBtn">保存</button></div></div>`;
    }

    mainContent.innerHTML = html;

    // 事件绑定
    if (page === 'home') {
      document.getElementById('startCreateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); switchPage('create'); });
    }
    else if (page === 'create') {
      const log = document.getElementById('chatLog'); const append = (t, ty) => { const d = document.createElement('div'); d.className = 'chat-bubble ' + (ty==='system'?'bubble-system':'bubble-user'); d.textContent = t; log.appendChild(d); log.scrollTop = log.scrollHeight; };
      let last = '';
      document.getElementById('sendMsgBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const msg = document.getElementById('userMsgInput').value.trim(); if (!msg) return; append('💡 ' + msg, 'user'); document.getElementById('userMsgInput').value = ''; append('构思已记录。', 'system'); });
      document.getElementById('genOutlineBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); append('生成大纲…', 'system'); setTimeout(() => { last = '【大纲】1.开端 2.发展 3.高潮 4.结局'; append(last, 'system'); updateSkill('人物塑造', 8); }, 400); });
      document.getElementById('genFullBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); append('生成全文…', 'system'); setTimeout(() => { last = '第一章 觉醒（示例）'; append(last, 'system'); updateSkill('导演思维', 8); }, 400); });
      document.getElementById('saveChapterBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); if (last) saveWork('创作工坊', last); else showToast('暂无内容'); });
      document.getElementById('userMsgInput').addEventListener('input', function() { document.getElementById('createWordCount').textContent = '字数：' + this.value.length; });
    }
    else if (page === 'remake') {
      document.getElementById('remakeInput').addEventListener('input', function() { document.getElementById('remakeInputCount').textContent = '原文字数：' + this.value.length; });
      document.getElementById('remakeGenerateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const res = document.getElementById('remakeResult'); res.innerText = '【转换结果】示例内容…'; document.getElementById('remakeResultCount').textContent = '结果字数：' + res.innerText.length; });
      document.getElementById('remakeSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const r = document.getElementById('remakeResult').innerText; if (!r.includes('结果将显示')) saveWork('二次创作', r); });
    }
    else if (page === 'video') {
      document.getElementById('addSceneBtn').addEventListener('click', () => { const div = document.createElement('div'); div.style.display = 'flex'; div.style.gap = '10px'; div.style.marginTop = '10px'; div.innerHTML = `<input placeholder="新场景描述" class="scene-desc" style="flex:2;"><input placeholder="镜头" class="scene-cam" style="flex:1;"><select class="scene-mood"><option>史诗</option></select>`; document.getElementById('sceneTimeline').appendChild(div); });
      document.getElementById('videoGenerateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const scenes = [...document.querySelectorAll('.scene-desc')].map(i => i.value || '未描述').join(' → '); const res = document.getElementById('videoResult'); res.innerText = `分镜脚本：${scenes}`; document.getElementById('videoWordCount').textContent = '分镜字数：' + res.innerText.length; });
      document.getElementById('videoSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const r = document.getElementById('videoResult').innerText; if (r) saveWork('漫剧分镜', r); });

      document.getElementById('musicGenerateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const mood = document.getElementById('musicMood').value; const styles = [...document.querySelectorAll('.music-chip-card.active')].map(c => c.dataset.style).join('、') || '流行'; document.getElementById('musicResult').innerHTML = `生成配乐：《${mood}的${styles}乐章》`; });
      document.getElementById('musicSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const r = document.getElementById('musicResult').innerText; if (r) saveWork('音乐配乐', r); });
    }
    else if (page === 'aiassistant') {
      let curModel = null;
      document.querySelectorAll('.list-item').forEach(i => i.addEventListener('click', function() { curModel = this.dataset.model; document.getElementById('currentModelName').textContent = '当前模型：' + curModel; document.getElementById('aiChatLog').innerHTML = ''; }));
      document.getElementById('aiSend').addEventListener('click', () => { if (!curUser) return requireLogin(); const msg = document.getElementById('aiInput').value; if (!curModel) return showToast('请选择模型'); document.getElementById('aiChatLog').innerHTML += `<p><b>你:</b> ${escapeHtml(msg)}</p><p><b>${curModel}:</b> 模拟回复。</p>`; document.getElementById('aiInput').value = ''; });
      document.getElementById('aiSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const t = document.getElementById('aiChatLog').innerText; if (t) saveWork('AI对话', t); });
    }
    else if (page === 'monetize') {
      let sel = new Set(); const cards = document.querySelectorAll('.platform-card');
      const updateUI = () => { document.getElementById('selectedCount').textContent = sel.size; document.getElementById('selectedPlatformList').innerHTML = [...sel].map(p => `<div>✅ ${p}</div>`).join(''); };
      cards.forEach(c => c.addEventListener('click', function() { const p = this.dataset.platform; sel.has(p) ? (sel.delete(p), this.classList.remove('selected')) : (sel.add(p), this.classList.add('selected')); updateUI(); }));
      document.getElementById('selectAll').addEventListener('click', () => { cards.forEach(c => { sel.add(c.dataset.platform); c.classList.add('selected'); }); updateUI(); });
      document.getElementById('clearAll').addEventListener('click', () => { sel.clear(); cards.forEach(c => c.classList.remove('selected')); updateUI(); });
      document.getElementById('batchPublish').addEventListener('click', () => { if (!curUser) return requireLogin(); if (sel.size === 0) return showToast('请选择平台'); showToast(`已发布至 ${sel.size} 个平台`); saveWork('变现发布', `发布至：${[...sel].join(', ')}`); });
      document.getElementById('monetizeHistoryBtn').addEventListener('click', () => { const works = JSON.parse(localStorage.getItem('savedWorks')).filter(w => w.type === '变现发布'); document.getElementById('selectedPlatformList').innerHTML = works.map(w => `<div>${w.time} ${escapeHtml(w.content)}</div>`).join('') || '暂无历史'; });
    }
    else if (page === 'promote') {
      document.getElementById('promoteInput').addEventListener('input', function() { document.getElementById('promoteInputCount').textContent = '简介字数：' + this.value.length; });
      document.getElementById('promoteGenerateBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const platform = document.getElementById('promotePlatform').value; const res = document.getElementById('promoteResult'); res.innerText = `【${platform}推广文案】\n🔥 重磅推荐！#小说推荐`; document.getElementById('promoteResultCount').textContent = '文案字数：' + res.innerText.length; });
      document.getElementById('promoteCopyBtn').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('promoteResult').innerText); showToast('已复制'); });
      document.getElementById('promoteSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const r = document.getElementById('promoteResult').innerText; if (r) saveWork('推广文案', r); });
    }
    else if (page === 'deai') {
      document.getElementById('deaiInput').addEventListener('input', function() { document.getElementById('deaiInputCount').textContent = '字数：' + this.value.length; });
      document.getElementById('deaiProcessBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const input = document.getElementById('deaiInput').value, mode = document.getElementById('deaiMode').value; const out = input.replace(/人工智能/g, '智能').replace(/AI/g, '人工'); document.getElementById('deaiResult').innerText = out; document.getElementById('deaiResultCount').textContent = '字数：' + out.length; showToast(`${mode}处理完成`); });
      document.getElementById('deaiCopyBtn').addEventListener('click', () => { navigator.clipboard.writeText(document.getElementById('deaiResult').innerText); showToast('已复制'); });
      document.getElementById('deaiSaveBtn').addEventListener('click', () => { if (!curUser) return requireLogin(); const t = document.getElementById('deaiResult').innerText; if (t.trim()) saveWork('去AI作品', t); });
    }
    refreshSavedPanel();
  }

  navLinks.forEach(a => a.addEventListener('click', e => { e.preventDefault(); switchPage(a.getAttribute('href').substring(1)); }));
  const startPage = location.hash ? location.hash.substring(1) : 'home';
  switchPage(startPage);
  window.addEventListener('hashchange', () => { const page = location.hash.substring(1) || 'home'; navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + page)); renderPage(page); });
  startGuestTimer();
});
</script>
